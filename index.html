<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboluMC - Resmi Web Sitesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .wrapper {
            width: 100%;
            max-width: 650px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease-out;
        }
        h1 {
            font-size: 2.5rem;
            color: #4ade80;
            text-align: center;
            margin-bottom: 8px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.2);
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .ip-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .ip-text {
            font-family: 'Consolas', monospace;
            font-size: 1.2rem;
            color: #e2e8f0;
            font-weight: 600;
        }
        .copy-btn {
            background: #16a34a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .copy-btn:hover {
            background: #15803d;
            transform: translateY(-1px);
        }
        .grid-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .info-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }
        .info-card h3 {
            color: #94a3b8;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f1f5f9;
        }
        .bstats-full-card {
            background: linear-gradient(145deg, rgba(22, 163, 74, 0.1) 0%, rgba(15, 23, 42, 0.6) 100%);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            margin-top: 20px;
        }
        .bstats-full-card h3 {
            color: #4ade80;
            font-size: 1.2rem;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .bstats-full-card p {
            color: #94a3b8;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
        }
        .bstats-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: rgba(22, 163, 74, 0.2);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.4);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .bstats-link-btn:hover {
            background: #16a34a;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(22, 163, 74, 0.3);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 500px) {
            .grid-panel { grid-template-columns: 1fr; }
            .wrapper { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>TurboluMC</h1>
    <div class="subtitle">Resmi Sunucu Durum Paneli</div>

    <div class="ip-container">
        <span class="ip-text" id="sunucu-ip-text">turbolu.mcsh.io</span>
        <button class="copy-btn" onclick="kopyalaIP()">
            <i class="fa-regular fa-copy"></i> Kopyala
        </button>
    </div>

    <div class="grid-panel">
        <div class="info-card">
            <h3>Sunucu Durumu</h3>
            <div class="info-value" id="online-durum" style="color: #64748b;">Yükleniyor...</div>
        </div>
        <div class="info-card">
            <h3>Aktif Oyuncular</h3>
            <div class="info-value" id="oyuncu-sayisi" style="color: #4ade80;">0 / 0</div>
        </div>
    </div>

    <div class="bstats-full-card">
        <h3><i class="fa-solid fa-chart-line"></i> bStats Canlı Köprüsü</h3>
        <p>Sunucunun arka plan verileri, yüklü eklenti istatistikleri ve küresel Java metrikleri eşleşen UUID kimliği ile bStats ağına aktarıldı.</p>
        <a href="https://bstats.org/" target="_blank" class="bstats-link-btn">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> Durumu Görmek İçin Tıklayınız
        </a>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
