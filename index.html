<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboluMC - Resmi Web Sitesi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { margin-bottom: 5px; color: #43a047; }
        .ip-box {
            background: #2d2d2d;
            padding: 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }
        .copy-btn {
            background: #43a047;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #388e3c; }
        .status-panel {
            background: #252525;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 16px;
        }
        .bstats-card {
            border: 1px solid #43a047;
            border-radius: 8px;
            padding: 20px;
            background: rgba(67, 160, 71, 0.05);
            margin-top: 25px;
        }
        .bstats-btn {
            display: inline-block;
            text-decoration: none;
            background: #43a047;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 12px;
            transition: 0.2s;
        }
        .bstats-btn:hover { background: #388e3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>TurboluMC</h1>
    <p style="color: #aaa; margin-top: 0;">Resmi Sunucu Paneli</p>

    <div class="ip-box">
        <span id="sunucu-ip-text" style="font-weight: bold; letter-spacing: 0.5px;">turbolular.mcsh.io</span>
        <button class="copy-btn" onclick="kopyalaIP()"><i class="fa-regular fa-copy"></i> Kopyala</button>
    </div>

    <div class="status-panel">
        <div class="status-item">
            <span><i class="fa-solid fa-signal"></i> Durum:</span>
            <span id="online-durum">Yükleniyor...</span>
        </div>
        <div class="status-item">
            <span><i class="fa-solid fa-users"></i> Oyuncular:</span>
            <span id="oyuncu-sayisi" style="font-weight: bold; color: #43a047;">0 / 0</span>
        </div>
        <div class="status-item">
            <span><i class="fa-solid fa-code-branch"></i> Sürüm:</span>
            <span id="sunucu-surum">1.21.1</span>
        </div>
    </div>

    <div class="bstats-card">
        <h3><i class="fa-solid fa-chart-line" style="color: #43a047;"></i> bStats Entegrasyonu</h3>
        <p style="font-size: 13px; color: #bbb
